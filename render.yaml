services:
  - type: web
    name: moodsense-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false # User will set this in the dashboard
      - key: PYTHON_VERSION
        value: 3.10.12
